name: SharkSkyblock
version: '1.0.0'
main: dev.shark.skyblock.SharkSkyblock
api-version: '1.21'
description: A feature-rich Skyblock plugin with economy, skills, quests, and ocean events.
authors: [SharkDev]

permissions:
  sharksb.admin:
    description: Full admin access to SharkSkyblock
    default: op

commands:
  island:
    description: Island management
    usage: /island <create|home|delete|info|setbiome>
    permission: ''
  balance:
    description: Check your Shark Coin balance
    usage: /balance [player]
    permission: ''
  pay:
    description: Pay another player Shark Coins
    usage: /pay <player> <amount>
    permission: ''
  skills:
    description: View your skills
    usage: /skills [player]
    permission: ''
  quests:
    description: View your daily quests
    usage: /quests
    permission: ''
  sharksb:
    description: Admin command
    usage: /sharksb <reload|givecoin|setskill>
    permission: sharksb.admin
